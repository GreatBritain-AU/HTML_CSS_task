<!DOCTYPE html>
<html lang="en">
<head>

    <title>Form</title>
</head>
<body>
    <form>
        <fieldset>
            <legend>Personal info</legend>
            <div class="fCouple">
                <ladel for="first_name">First name</ladel>
                <input type="text" id="first_name">
            </div>
            <div class="sCouple">
                <ladel for="last_name">Last name</ladel>
                <input type="text" id="last_name">
            </div>
            <div class="birthday">
                <ladel for="bDay">Birthday</ladel>
                <input type="datetime-local" id="bDay">
            </div>
            <p>Gender</p>
            <input type="radio" id="male">
            <ladel for="male">Male</ladel>

            <input type="radio" id="female">
            <ladel for="female">Female</ladel>
        </fieldset>
        <fieldset>
            <legend>Contacts</legend>
        </fieldset>
        <fieldset>
            <legend>Car info</legend>
        </fieldset>
    </form>
</body>
</html>
