<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/form.css">
    <title>Form</title>
</head>
<body>
    <a href="../../index.html">Повернутися на головну</a>
    <form>
        <fieldset>
            <legend>Personal info</legend>
            <div class="fCouple">
                <label for="first_name">First name</label>
                <input type="text" id="first_name">
            </div>
            <div class="sCouple">
                <label for="last_name">Last name</label>
                <input type="text" id="last_name">
            </div>
            <div class="birthday">
                <label for="bDay">Birthday</label>
                <input type="datetime-local" id="bDay">
            </div>
            <p>Gender</p>
            <label for="male">Male</label>
            <input name="gender" type="radio" id="male">
            
            <label for="female">Female</label>
            <input name="gender" type="radio" id="female">
                        
            <div class="exp">
                <label for="dExp">Drive experience</label>
                <select name="exp-list" id="dExp">
                    <option value="---">---</option>
                    <option value="more then 5 years">more then 5 years</option>
                    <option value="less then 5 years">less then 5 years</option>
                </select>
            </div>
        </fieldset>
        <fieldset>
            <legend>Contacts</legend>
            <div class="thCouple">
                <label for="e-mail">Email</label>
                <input type="email" id="e-mail">
            </div>

            <div class="foCouple">
                <label for="phone">Phone</label>
                <input type="tel" id="phone">
            </div>

            <div class="fiCouple">
                <label for="address">Address</label>
                <textarea name="inp-address" id="address"></textarea>
            </div>
        </fieldset>
        <fieldset>
            <legend>Car info</legend>
            <div class="brand">
                <label for="brand">Brand</label>
                <select name="brand-list" id="brand">
                    <option value="---">---</option>
                    <option value="Ford">Ford</option>
                    <option value="Volkswagen">Volkswagen</option>
                    <option value="Volvo">Volvo</option>
                </select>
            </div>

            <div class="car-model">
                <label for="model">Model</label>
                <select name="model-list" id="model">
                    <option value="---">---</option>
                    <option value="Ford Focus">Ford Focus</option>
                    <option value="Ford Mustang">Ford Mustang</option>
                    <option value="Volkswagen Golf">Volkswagen Golf</option>
                    <option value="Volkswagen Passat">Volkswagen Passat</option>
                    <option value="Volvo XC60">Volvo XC60</option>
                    <option value="Volvo S90">Volvo S90</option>
                </select>
            </div>

            <div class="used">
                <label for="usedCh">Used</label>
                <input type="checkbox" id="usedCh">
            </div>

            <div class="form-elem">
                    <div class="color-name">Color</div>
                    <label for="red">Red</label>
                    <input type="radio" name="color" id="red" checked>

                    <label for="blue">Blue</label>
                    <input type="radio" name="color" id="blue">

                    <label for="black">Black</label>
                    <input type="radio" name="color" id="black">

                    <label for="white">White</label>
                    <input type="radio" name="color" id="white">

                    <label for="gray">Gray</label>
                    <input type="radio" name="color" id="gray">

                </div>

                <div class="car-price">
                    <label for="price">Price</label>
                    <input 
                        type="range" 
                        name="price" 
                        id="price"
                        min="10"
                        max="100"
                        step="10"
                        list="price-list">

                        <datalist id="price-list">
                            <option value="10"></option>
                            <option value="20"></option>
                            <option value="30"></option>
                            <option value="40"></option>
                            <option value="50"></option>
                            <option value="60"></option>
                            <option value="70"></option>
                            <option value="80"></option>
                            <option value="90"></option>
                            <option value="100"></option>
                        </datalist>
                </div>

        </fieldset>

            <div class="form-elem-btn">
                <input type="reset" value="Cancel">
                <input type="submit" value="Ok">
            </div>

        
    </form>
</body>
</html>
